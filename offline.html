<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PC Builder — Offline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.icon{font-size:4rem;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-family:monospace;font-size:1.4rem;color:#00e5ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
p{font-size:.85rem;color:#7a7f96;line-height:1.7;max-width:300px;margin-bottom:24px}
.btn{padding:11px 28px;background:#00e5ff;color:#000;border:none;border-radius:8px;font-family:monospace;font-size:.82rem;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;text-decoration:none;display:inline-block}
.note{font-size:.7rem;color:#555;margin-top:16px;font-family:monospace}
</style>
</head>
<body>
<div class="icon">⚙️</div>
<h1>You're Offline</h1>
<p>No internet connection detected. Your saved builds are still available — reconnect to fetch live exchange rates and use all features.</p>
<a class="btn" href="/" onclick="window.location.reload()">Try Again</a>
<div class="note">© 2026 Manik Roy. All Rights Reserved.</div>
</body>
</html>
